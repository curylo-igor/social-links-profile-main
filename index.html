<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
        position: absolute;
        bottom: 20px;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="profile-card">
      <img src="./assets/images/avatar-jessica.jpeg" class="profile-picture" />
      <p class="name text-preset-1">Jessica Randall</p>
      <p class="localization text-preset-2-bold">London, United Kingdom</p>
      <p class="role text-preset-2">"Front-end developer and avid reader."</p>
      <div class="buttons-container">
        <a href="#" class="profile-link text-preset-2-bold">GitHub</a>

        <a href="#" class="profile-link text-preset-2-bold">Frontend Mentor</a>
        <a href="#" class="profile-link text-preset-2-bold">LinkedIn</a>
        <a href="#" class="profile-link text-preset-2-bold">Twitter</a>

        <a
          href="https://instagram.com"
          target="_blank"
          rel="noopener noreferrer"
          class="profile-link text-preset-2-bold"
          >Instagram</a
        >
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a
        href="https://github.com/curylo-igor"
        target="_blank"
        rel="noopener noreferrer"
        >curylo-igor</a
      >.
    </footer>
  </body>
</html>
